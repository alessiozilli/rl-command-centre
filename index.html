<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RL Command Centre</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&family=Lexend+Mega:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --az: #990000;
            --qf: #c4922a;
            --per: #3a7fbf;
            --td: #2a9e8f;
            --fam: #9b72cf;
            --warm: #d4856a;
            --code: #5b9bd5;
            --family: #e091b8;
            --shared: #50c878;
            --bg: #0f0f0f;
            --surf: #1a1a1a;
            --surf2: #242424;
            --surf3: #2e2e2e;
            --text: #f0ede0;
            --text2: #a09c96;
            --text3: #6a6762;
            --border: #2e2e2e;
            --r: 10px;
            --font: 'Lexend', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font);
            line-height: 1.5;
            overflow-x: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--surf) 0%, var(--surf2) 100%);
            border-bottom: 2px solid var(--border);
            padding: 1.5rem;
            text-align: center;
        }

        .brand {
            font-family: 'Lexend Mega', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--family);
            margin-bottom: 0.5rem;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            font-size: 0.9rem;
            margin-top: 1rem;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.5rem 1rem;
            background: var(--surf3);
            border-radius: var(--r);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--shared);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .toolbar {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
            background: var(--surf);
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            max-width: 300px;
            padding: 0.6rem 1rem;
            background: var(--surf2);
            border: 1px solid var(--border);
            border-radius: var(--r);
            color: var(--text);
            font-family: var(--font);
        }

        .search-box::placeholder {
            color: var(--text3);
        }

        .btn {
            padding: 0.6rem 1.2rem;
            background: var(--surf2);
            border: 1px solid var(--border);
            border-radius: var(--r);
            color: var(--text);
            font-family: var(--font);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: var(--surf3);
            border-color: var(--shared);
        }

        .btn-primary {
            background: var(--shared);
            color: var(--bg);
            border-color: var(--shared);
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            padding: 0 1rem;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            background: var(--surf2);
            border: 2px solid transparent;
            border-radius: var(--r);
            color: var(--text2);
            cursor: pointer;
            font-family: var(--font);
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s ease;
            position: relative;
        }

        .filter-btn:hover {
            color: var(--text);
        }

        .filter-btn.active {
            color: var(--text);
            background: var(--surf3);
            border-left-color: var(--shared);
        }

        .filter-btn.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--shared);
            border-radius: var(--r) 0 0 var(--r);
        }

        .filter-count {
            margin-left: 0.3rem;
            color: var(--text3);
            font-size: 0.8rem;
        }

        .cat-color {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 0.4rem;
        }

        .boards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .board {
            background: var(--surf);
            border: 1px solid var(--border);
            border-radius: var(--r);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 400px);
        }

        .board-header {
            background: var(--surf2);
            padding: 1rem;
            border-bottom: 2px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .board-title {
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .board-title-color {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .board-title-count {
            color: var(--text2);
            font-size: 0.85rem;
            font-weight: 400;
        }

        .board-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-add-cat {
            background: none;
            border: 1px solid var(--border);
            color: var(--text2);
            padding: 0.4rem 0.6rem;
            cursor: pointer;
            font-size: 1rem;
            border-radius: var(--r);
        }

        .btn-add-cat:hover {
            color: var(--text);
            border-color: var(--shared);
        }

        .board-tasks {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .task-item {
            background: var(--surf2);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 0.8rem;
            margin-bottom: 0.6rem;
            display: flex;
            gap: 0.6rem;
            align-items: flex-start;
            transition: all 0.2s ease;
            position: relative;
            group: hover / task-hover;
        }

        .task-item:hover {
            background: var(--surf3);
            border-color: var(--shared);
        }

        .task-item.overdue {
            background: rgba(153, 0, 0, 0.15);
            border-color: var(--az);
        }

        .task-item.overdue:hover {
            background: rgba(153, 0, 0, 0.25);
        }

        .task-item.marked-today {
            border-left: 4px solid var(--qf);
            padding-left: calc(0.8rem - 3px);
        }

        .task-checkbox {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-radius: 50%;
            cursor: pointer;
            background: var(--surf3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            margin-top: 0.2rem;
        }

        .task-checkbox:hover {
            border-color: var(--shared);
        }

        .task-checkbox.done {
            background: var(--shared);
            border-color: var(--shared);
        }

        .task-checkbox.done::after {
            content: '✓';
            color: var(--bg);
            font-weight: 700;
            font-size: 0.9rem;
        }

        .task-content {
            flex: 1;
            min-width: 0;
        }

        .task-text {
            word-break: break-word;
            cursor: text;
            padding: 0.2rem 0.4rem;
            margin: -0.2rem -0.4rem;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .task-text:hover {
            background: rgba(80, 200, 120, 0.1);
        }

        .task-text.done {
            color: var(--text2);
            text-decoration: line-through;
        }

        .task-text-edit {
            background: var(--surf3);
            border: 1px solid var(--shared);
            color: var(--text);
            padding: 0.4rem 0.6rem;
            border-radius: 4px;
            font-family: var(--font);
            width: 100%;
            font-size: 0.95rem;
        }

        .task-meta {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            align-items: center;
            margin-top: 0.4rem;
            font-size: 0.75rem;
        }

        .task-priority {
            padding: 0.2rem 0.5rem;
            border-radius: 3px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .priority-high {
            background: rgba(153, 0, 0, 0.3);
            color: #ff6b6b;
        }

        .priority-med {
            background: rgba(196, 146, 42, 0.3);
            color: var(--qf);
        }

        .priority-low {
            background: rgba(58, 127, 191, 0.3);
            color: var(--per);
        }

        .task-time {
            padding: 0.2rem 0.5rem;
            background: rgba(91, 155, 213, 0.2);
            color: var(--code);
            border-radius: 3px;
            font-weight: 500;
        }

        .task-due {
            padding: 0.2rem 0.5rem;
            background: rgba(58, 127, 191, 0.2);
            color: var(--per);
            border-radius: 3px;
        }

        .task-assigned {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--family);
            color: var(--bg);
            font-weight: 700;
            font-size: 0.65rem;
            flex-shrink: 0;
        }

        .task-actions {
            display: flex;
            gap: 0.3rem;
            align-items: center;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .task-item:hover .task-actions {
            opacity: 1;
        }

        .task-btn {
            background: none;
            border: none;
            color: var(--text2);
            cursor: pointer;
            padding: 0.3rem;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .task-btn:hover {
            color: var(--text);
            background: var(--surf3);
        }

        .task-notes {
            margin-top: 0.6rem;
            padding-top: 0.6rem;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text2);
        }

        .task-notes-text {
            padding: 0.4rem;
            background: var(--surf3);
            border-radius: 4px;
            white-space: pre-wrap;
            word-break: break-word;
            margin-top: 0.4rem;
        }

        .task-notes-edit {
            background: var(--surf3);
            border: 1px solid var(--shared);
            color: var(--text);
            padding: 0.4rem;
            border-radius: 4px;
            font-family: var(--font);
            width: 100%;
            font-size: 0.85rem;
            resize: vertical;
            min-height: 60px;
        }

        .task-activity {
            margin-top: 0.6rem;
            padding-top: 0.6rem;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text3);
        }

        .activity-entry {
            padding: 0.3rem 0.4rem;
            background: var(--surf3);
            border-radius: 3px;
            margin-bottom: 0.3rem;
        }

        .add-task-form {
            padding: 1rem;
            border-top: 1px solid var(--border);
            background: var(--surf2);
        }

        .form-group {
            margin-bottom: 0.8rem;
        }

        .form-label {
            font-size: 0.75rem;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: block;
            margin-bottom: 0.3rem;
        }

        .form-input {
            width: 100%;
            padding: 0.6rem;
            background: var(--surf3);
            border: 1px solid var(--border);
            border-radius: var(--r);
            color: var(--text);
            font-family: var(--font);
            font-size: 0.9rem;
        }

        .form-input::placeholder {
            color: var(--text3);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        select {
            padding: 0.6rem;
            background: var(--surf3);
            border: 1px solid var(--border);
            border-radius: var(--r);
            color: var(--text);
            font-family: var(--font);
            font-size: 0.9rem;
        }

        input[type="date"],
        input[type="time"] {
            padding: 0.6rem;
            background: var(--surf3);
            border: 1px solid var(--border);
            border-radius: var(--r);
            color: var(--text);
            font-family: var(--font);
            font-size: 0.9rem;
        }

        input[type="color"] {
            width: 100%;
            height: 40px;
            border: 1px solid var(--border);
            border-radius: var(--r);
            cursor: pointer;
        }

        .form-row-buttons {
            display: flex;
            gap: 0.6rem;
        }

        .form-row-buttons button {
            flex: 1;
        }

        .footer {
            background: var(--surf);
            border-top: 1px solid var(--border);
            padding: 1rem;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text2);
        }

        .sync-status {
            display: inline-block;
            margin-left: 1rem;
            font-size: 0.75rem;
            padding: 0.3rem 0.6rem;
            background: var(--surf2);
            border-radius: var(--r);
        }

        .sync-status.synced {
            color: var(--shared);
        }

        .sync-status.error {
            color: var(--az);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--surf);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 1.5rem;
            max-width: 400px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text);
        }

        @media (max-width: 768px) {
            .boards {
                grid-template-columns: 1fr;
            }

            .stats {
                gap: 1rem;
            }

            .toolbar {
                flex-direction: column;
                gap: 0.6rem;
            }

            .search-box {
                max-width: 100%;
            }

            .filters {
                overflow-x: auto;
                padding-bottom: 0.5rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="brand">RL COMMAND CENTRE</div>
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="stat-open">0</div>
                <div class="stat-label">Open</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="stat-today">0</div>
                <div class="stat-label">Today</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="stat-done">0</div>
                <div class="stat-label">Done</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="stat-shared">0</div>
                <div class="stat-label">Shared</div>
            </div>
        </div>
    </div>

    <div class="toolbar">
        <input type="text" class="search-box" id="search-input" placeholder="Search tasks...">
        <button class="btn btn-primary" id="sync-btn">Sync</button>
    </div>

    <div class="filters" id="filters-container"></div>

    <div class="container">
        <div class="boards" id="boards-container"></div>
    </div>

    <div class="footer">
        <div>RL Command Centre — AZ Custom Knives Ltd.</div>
        <div class="sync-status" id="sync-status">Ready</div>
    </div>

    <div class="modal" id="new-cat-modal">
        <div class="modal-content">
            <div class="modal-header">New Category</div>
            <div class="form-group">
                <label class="form-label">Category Name</label>
                <input type="text" class="form-input" id="new-cat-name" placeholder="e.g., Urgent Tasks">
            </div>
            <div class="form-group">
                <label class="form-label">Color</label>
                <input type="color" id="new-cat-color" value="#50c878">
            </div>
            <div class="form-row-buttons">
                <button class="btn" id="cancel-cat-btn">Cancel</button>
                <button class="btn btn-primary" id="save-cat-btn">Save</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================================
        // CONFIG
        // ============================================================================
        const CONFIG = {
            // Shared Gist (GitHub)
            SHARED_GIST_ID: '',
            SHARED_GIST_TOKEN: '',
            SHARED_GIST_FILE: 'azck_shared_tasks.json',

            // Personal Gist (GitHub)
            GIST_ID: '',
            GIST_TOKEN: '',
            GIST_FILE: 'rl_cc_tasks.json',

            // Categories
            DEFAULT_CATEGORIES: [
                { id: 'shared', name: 'Shared', color: '#50c878' },
                { id: 'clients', name: 'Clients', color: '#3a7fbf' },
                { id: 'orders', name: 'Orders & Store', color: '#c4922a' },
                { id: 'social', name: 'Social Media', color: '#e091b8' },
                { id: 'grants', name: 'Grants', color: '#9b72cf' },
                { id: 'admin', name: 'Admin', color: '#d4856a' },
                { id: 'family', name: 'Family', color: '#9b72cf' }
            ],

            // Storage keys
            LOCAL_STORAGE_KEY: 'rl_cc_tasks',
            CUSTOM_CATS_KEY: 'rl_cc_custom_cats',
            SHARED_TASKS_KEY: 'rl_cc_shared_tasks_cache',
            LAST_SYNC_KEY: 'rl_cc_last_sync'
        };

        // ============================================================================
        // STATE
        // ============================================================================
        let state = {
            tasks: [],
            sharedTasks: [],
            categories: [...CONFIG.DEFAULT_CATEGORIES],
            currentFilter: 'all',
            searchQuery: '',
            currentCategoryModal: null,
            syncStatus: 'ready',
            lastSync: null
        };

        // ============================================================================
        // UTILS
        // ============================================================================
        const utils = {
            generateId: () => `task_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,

            todayString: () => {
                const d = new Date();
                return d.toISOString().split('T')[0];
            },

            isToday: (dateStr) => dateStr === utils.todayString(),

            isOverdue: (task) => {
                if (task.status === 'done' || task.status === 'archived') return false;
                if (!task.dueDate) return false;
                return task.dueDate < utils.todayString();
            },

            shouldArchive: (task) => {
                if (task.status !== 'done') return false;
                const completed = new Date(task.completedAt || task.updatedAt || task.createdAt);
                const now = new Date();
                const days = (now - completed) / (1000 * 60 * 60 * 24);
                return days >= 7;
            },

            getVisibleTasks: (tasks) => {
                let filtered = tasks.filter(t => {
                    if (state.currentFilter === 'all') return true;
                    if (state.currentFilter === 'open') return t.status !== 'done' && t.status !== 'archived';
                    if (state.currentFilter === 'today') return t.markedToday;
                    if (state.currentFilter === 'done') return t.status === 'done';
                    if (state.currentFilter === 'archive') return t.status === 'archived';
                    return t.category === state.currentFilter;
                });

                if (state.searchQuery) {
                    const q = state.searchQuery.toLowerCase();
                    filtered = filtered.filter(t =>
                        t.text.toLowerCase().includes(q) ||
                        t.notes.toLowerCase().includes(q)
                    );
                }

                return filtered.sort((a, b) => a.order - b.order);
            },

            getTasksByCategory: (tasks, catId) => {
                return tasks.filter(t => t.category === catId);
            },

            formatTime: (mins) => {
                if (mins < 60) return `${mins}m`;
                const hours = Math.floor(mins / 60);
                const remainder = mins % 60;
                return remainder > 0 ? `${hours}h ${remainder}m` : `${hours}h`;
            },

            formatDate: (dateStr) => {
                if (!dateStr) return '';
                const d = new Date(dateStr + 'T00:00:00');
                return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            }
        };

        // ============================================================================
        // STORAGE
        // ============================================================================
        const storage = {
            load: () => {
                const cached = localStorage.getItem(CONFIG.LOCAL_STORAGE_KEY);
                state.tasks = cached ? JSON.parse(cached) : [];

                const customCats = localStorage.getItem(CONFIG.CUSTOM_CATS_KEY);
                if (customCats) {
                    state.categories = [...CONFIG.DEFAULT_CATEGORIES, ...JSON.parse(customCats)];
                }

                const lastSync = localStorage.getItem(CONFIG.LAST_SYNC_KEY);
                state.lastSync = lastSync ? new Date(lastSync) : null;
            },

            save: () => {
                localStorage.setItem(CONFIG.LOCAL_STORAGE_KEY, JSON.stringify(state.tasks));
            },

            saveCustomCategories: () => {
                const custom = state.categories.filter(c => !CONFIG.DEFAULT_CATEGORIES.find(dc => dc.id === c.id));
                localStorage.setItem(CONFIG.CUSTOM_CATS_KEY, JSON.stringify(custom));
            },

            saveSyncTime: () => {
                state.lastSync = new Date();
                localStorage.setItem(CONFIG.LAST_SYNC_KEY, state.lastSync.toISOString());
            }
        };

        // ============================================================================
        // TASKS
        // ============================================================================
        const tasks = {
            add: (category, text, priority = 'med', timeEst = null, dueDate = null) => {
                const newTask = {
                    id: utils.generateId(),
                    category,
                    text,
                    priority,
                    timeEst,
                    dueDate,
                    notes: '',
                    status: 'open',
                    markedToday: false,
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString(),
                    completedAt: null,
                    order: state.tasks.length,
                    isShared: false,
                    assignedTo: ''
                };
                state.tasks.push(newTask);
                storage.save();
                render.all();
            },

            update: (id, updates) => {
                const task = state.tasks.find(t => t.id === id);
                if (task) {
                    Object.assign(task, updates, { updatedAt: new Date().toISOString() });
                    storage.save();
                }
            },

            delete: (id) => {
                state.tasks = state.tasks.filter(t => t.id !== id);
                storage.save();
                render.all();
            },

            toggle: (id) => {
                const task = state.tasks.find(t => t.id === id);
                if (task) {
                    if (task.status === 'done') {
                        task.status = 'open';
                        task.completedAt = null;
                    } else {
                        task.status = 'done';
                        task.completedAt = new Date().toISOString();
                    }
                    storage.save();
                    render.all();
                }
            },

            markToday: (id) => {
                const task = state.tasks.find(t => t.id === id);
                if (task) {
                    task.markedToday = !task.markedToday;
                    storage.save();
                    render.all();
                }
            },

            autoArchive: () => {
                state.tasks.forEach(t => {
                    if (utils.shouldArchive(t)) {
                        t.status = 'archived';
                    }
                });
                storage.save();
            }
        };

        // ============================================================================
        // CATEGORIES
        // ============================================================================
        const categories = {
            add: (name, color) => {
                const newCat = {
                    id: `cat_${Date.now()}`,
                    name,
                    color
                };
                state.categories.push(newCat);
                storage.saveCustomCategories();
                render.all();
            },

            delete: (id) => {
                // Don't delete default categories
                if (CONFIG.DEFAULT_CATEGORIES.find(c => c.id === id)) return;
                state.categories = state.categories.filter(c => c.id !== id);
                storage.saveCustomCategories();
                render.all();
            },

            getColor: (id) => {
                const cat = state.categories.find(c => c.id === id);
                return cat ? cat.color : '#999';
            },

            getName: (id) => {
                const cat = state.categories.find(c => c.id === id);
                return cat ? cat.name : 'Unknown';
            }
        };

        // ============================================================================
        // RENDER
        // ============================================================================
        const render = {
            all: () => {
                render.stats();
                render.filters();
                render.boards();
            },

            stats: () => {
                tasks.autoArchive();
                const visible = state.tasks;

                const openCount = visible.filter(t => t.status !== 'done' && t.status !== 'archived').length;
                const todayCount = visible.filter(t => t.markedToday && t.status !== 'archived').length;
                const doneCount = visible.filter(t => t.status === 'done').length;
                const sharedCount = visible.filter(t => t.isShared).length;

                document.getElementById('stat-open').textContent = openCount;
                document.getElementById('stat-today').textContent = todayCount;
                document.getElementById('stat-done').textContent = doneCount;
                document.getElementById('stat-shared').textContent = sharedCount;
            },

            filters: () => {
                const container = document.getElementById('filters-container');
                container.innerHTML = '';

                const filterDefs = [
                    { id: 'all', label: 'All' },
                    { id: 'open', label: 'Open' },
                    { id: 'today', label: 'Today' },
                    { id: 'done', label: 'Done' },
                    { id: 'archive', label: 'Archive' }
                ];

                filterDefs.forEach(filter => {
                    const btn = document.createElement('button');
                    btn.className = `filter-btn ${state.currentFilter === filter.id ? 'active' : ''}`;
                    btn.textContent = filter.label;

                    if (state.currentFilter === filter.id) {
                        btn.classList.add('active');
                    }

                    btn.addEventListener('click', () => {
                        state.currentFilter = filter.id;
                        render.all();
                    });

                    container.appendChild(btn);
                });

                // Category filters
                state.categories.forEach(cat => {
                    const catTasks = state.tasks.filter(t => t.category === cat.id);
                    const count = catTasks.filter(t => state.currentFilter === 'all' || utils.getVisibleTasks([t]).length > 0).length;

                    const btn = document.createElement('button');
                    btn.className = `filter-btn ${state.currentFilter === cat.id ? 'active' : ''}`;
                    btn.innerHTML = `<span class="cat-color" style="background-color: ${cat.color}"></span>${cat.name}<span class="filter-count">(${count})</span>`;

                    btn.addEventListener('click', () => {
                        state.currentFilter = cat.id;
                        render.all();
                    });

                    container.appendChild(btn);
                });
            },

            boards: () => {
                const container = document.getElementById('boards-container');
                container.innerHTML = '';

                // Determine board order: Shared first, then alphabetical
                const boardCategories = [...state.categories].sort((a, b) => {
                    if (a.id === 'shared') return -1;
                    if (b.id === 'shared') return 1;
                    return a.name.localeCompare(b.name);
                });

                boardCategories.forEach(cat => {
                    const board = render.createBoard(cat);
                    container.appendChild(board);
                });
            },

            createBoard: (cat) => {
                const boardEl = document.createElement('div');
                boardEl.className = 'board';
                boardEl.dataset.category = cat.id;

                const catTasks = utils.getVisibleTasks(state.tasks.filter(t => t.category === cat.id));

                // Header
                const header = document.createElement('div');
                header.className = 'board-header';
                header.innerHTML = `
                    <div class="board-title">
                        <span class="board-title-color" style="background-color: ${cat.color}"></span>
                        ${cat.name}
                        <span class="board-title-count">${catTasks.length}</span>
                    </div>
                    <div class="board-actions">
                        ${CONFIG.DEFAULT_CATEGORIES.find(c => c.id === cat.id) ? '' : `<button class="btn-add-cat" title="Delete category">×</button>`}
                    </div>
                `;

                if (!CONFIG.DEFAULT_CATEGORIES.find(c => c.id === cat.id)) {
                    header.querySelector('.btn-add-cat').addEventListener('click', () => {
                        if (confirm(`Delete category "${cat.name}"? Tasks will be unassigned.`)) {
                            categories.delete(cat.id);
                        }
                    });
                }

                boardEl.appendChild(header);

                // Tasks
                const tasksContainer = document.createElement('div');
                tasksContainer.className = 'board-tasks';
                tasksContainer.id = `tasks-${cat.id}`;
                tasksContainer.setAttribute('data-category', cat.id);

                catTasks.forEach(task => {
                    const taskEl = render.createTaskElement(task);
                    tasksContainer.appendChild(taskEl);
                });

                tasksContainer.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    tasksContainer.style.background = 'rgba(80, 200, 120, 0.05)';
                });

                tasksContainer.addEventListener('dragleave', () => {
                    tasksContainer.style.background = '';
                });

                tasksContainer.addEventListener('drop', (e) => {
                    e.preventDefault();
                    tasksContainer.style.background = '';
                });

                boardEl.appendChild(tasksContainer);

                // Add task form
                const form = document.createElement('div');
                form.className = 'add-task-form';
                form.innerHTML = `
                    <div class="form-group">
                        <label class="form-label">Task</label>
                        <input type="text" class="form-input task-text-input" placeholder="Add a task...">
                    </div>
                    <div class="form-row">
                        <div>
                            <label class="form-label">Priority</label>
                            <select class="task-priority-select">
                                <option value="low">Low</option>
                                <option value="med" selected>Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label">Time Est.</label>
                            <select class="task-time-select">
                                <option value="">None</option>
                                <option value="15">15 min</option>
                                <option value="30">30 min</option>
                                <option value="60">1 hour</option>
                                <option value="90">1.5 hours</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Due Date (Optional)</label>
                        <input type="date" class="task-due-input">
                    </div>
                    <div class="form-row-buttons">
                        <button class="btn btn-primary add-task-btn">Add</button>
                    </div>
                `;

                const addBtn = form.querySelector('.add-task-btn');
                const textInput = form.querySelector('.task-text-input');
                const prioritySelect = form.querySelector('.task-priority-select');
                const timeSelect = form.querySelector('.task-time-select');
                const dueInput = form.querySelector('.task-due-input');

                const addTask = () => {
                    const text = textInput.value.trim();
                    if (!text) return;

                    tasks.add(
                        cat.id,
                        text,
                        prioritySelect.value,
                        timeSelect.value ? parseInt(timeSelect.value) : null,
                        dueInput.value || null
                    );

                    textInput.value = '';
                    prioritySelect.value = 'med';
                    timeSelect.value = '';
                    dueInput.value = '';
                    textInput.focus();
                };

                addBtn.addEventListener('click', addTask);
                textInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') addTask();
                });

                boardEl.appendChild(form);

                return boardEl;
            },

            createTaskElement: (task) => {
                const el = document.createElement('div');
                el.className = `task-item ${task.status === 'done' ? 'done' : ''} ${task.markedToday ? 'marked-today' : ''} ${utils.isOverdue(task) ? 'overdue' : ''}`;
                el.dataset.taskId = task.id;
                el.draggable = true;

                // Checkbox
                const checkbox = document.createElement('div');
                checkbox.className = `task-checkbox ${task.status === 'done' ? 'done' : ''}`;
                checkbox.addEventListener('click', () => tasks.toggle(task.id));

                // Context menu for "mark today"
                el.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    tasks.markToday(task.id);
                });

                // Content
                const content = document.createElement('div');
                content.className = 'task-content';

                const text = document.createElement('div');
                text.className = `task-text ${task.status === 'done' ? 'done' : ''}`;
                text.textContent = task.text;

                text.addEventListener('dblclick', () => {
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'task-text-edit';
                    input.value = task.text;

                    text.replaceWith(input);
                    input.focus();
                    input.select();

                    const save = () => {
                        const newText = input.value.trim() || task.text;
                        tasks.update(task.id, { text: newText });
                        render.all();
                    };

                    input.addEventListener('blur', save);
                    input.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') save();
                        if (e.key === 'Escape') render.all();
                    });
                });

                content.appendChild(text);

                // Meta
                const meta = document.createElement('div');
                meta.className = 'task-meta';

                if (task.priority) {
                    const pri = document.createElement('span');
                    pri.className = `task-priority priority-${task.priority}`;
                    pri.textContent = task.priority.toUpperCase();
                    meta.appendChild(pri);
                }

                if (task.timeEst) {
                    const time = document.createElement('span');
                    time.className = 'task-time';
                    time.textContent = utils.formatTime(task.timeEst);
                    meta.appendChild(time);
                }

                if (task.dueDate) {
                    const due = document.createElement('span');
                    due.className = 'task-due';
                    due.textContent = utils.formatDate(task.dueDate);
                    meta.appendChild(due);
                }

                if (task.isShared && task.assignedTo) {
                    const assigned = document.createElement('span');
                    assigned.className = 'task-assigned';
                    const initials = {
                        'alessio': 'AZ',
                        'reanna': 'RL',
                        'both': 'Both'
                    };
                    assigned.textContent = initials[task.assignedTo] || '?';
                    meta.appendChild(assigned);
                }

                content.appendChild(meta);

                // Notes
                if (task.notes) {
                    const notesEl = document.createElement('div');
                    notesEl.className = 'task-notes';
                    notesEl.innerHTML = `
                        <div><strong>Notes</strong> <button class="task-btn expand-notes-btn" style="font-size: 0.8rem;">▼</button></div>
                        <div class="task-notes-text" style="display: none;">${task.notes}</div>
                    `;

                    const expandBtn = notesEl.querySelector('.expand-notes-btn');
                    const notesText = notesEl.querySelector('.task-notes-text');
                    let expanded = false;

                    expandBtn.addEventListener('click', () => {
                        expanded = !expanded;
                        notesText.style.display = expanded ? 'block' : 'none';
                        expandBtn.textContent = expanded ? '▲' : '▼';
                    });

                    content.appendChild(notesEl);
                }

                // Actions
                const actions = document.createElement('div');
                actions.className = 'task-actions';
                actions.innerHTML = `
                    <button class="task-btn notes-btn" title="Add/edit notes">📝</button>
                    <button class="task-btn delete-btn" title="Delete">×</button>
                `;

                const notesBtn = actions.querySelector('.notes-btn');
                notesBtn.addEventListener('click', () => {
                    const input = document.createElement('textarea');
                    input.className = 'task-notes-edit';
                    input.value = task.notes;

                    if (task.notes) {
                        const notesEl = content.querySelector('.task-notes');
                        notesEl.replaceWith(input);
                    } else {
                        content.appendChild(input);
                    }

                    input.focus();

                    const save = () => {
                        tasks.update(task.id, { notes: input.value });
                        render.all();
                    };

                    input.addEventListener('blur', save);
                    input.addEventListener('keydown', (e) => {
                        if (e.key === 'Escape') render.all();
                    });
                });

                const deleteBtn = actions.querySelector('.delete-btn');
                deleteBtn.addEventListener('click', () => {
                    if (confirm('Delete this task?')) {
                        tasks.delete(task.id);
                    }
                });

                el.appendChild(checkbox);
                el.appendChild(content);
                el.appendChild(actions);

                // Drag events
                el.addEventListener('dragstart', (e) => {
                    e.dataTransfer.effectAllowed = 'move';
                    e.dataTransfer.setData('taskId', task.id);
                });

                return el;
            }
        };

        // ============================================================================
        // SYNC
        // ============================================================================
        const sync = {
            updateStatus: (message, type = 'info') => {
                const statusEl = document.getElementById('sync-status');
                statusEl.textContent = message;
                statusEl.className = `sync-status ${type === 'error' ? 'error' : 'synced'}`;
                if (type === 'info') {
                    setTimeout(() => {
                        statusEl.textContent = 'Ready';
                        statusEl.className = 'sync-status';
                    }, 3000);
                }
            },

            perform: async () => {
                sync.updateStatus('Syncing...');

                try {
                    // Sync shared tasks from Gist (if configured)
                    if (CONFIG.SHARED_GIST_ID && CONFIG.SHARED_GIST_TOKEN) {
                        await sync.fetchSharedTasks();
                        await sync.pushSharedTasks();
                    }

                    // Sync personal tasks (if configured)
                    if (CONFIG.GIST_ID && CONFIG.GIST_TOKEN) {
                        await sync.pushPersonalTasks();
                    }

                    storage.saveSyncTime();
                    sync.updateStatus('Synced');
                } catch (err) {
                    console.error('Sync error:', err);
                    sync.updateStatus('Sync failed', 'error');
                }
            },

            fetchSharedTasks: async () => {
                // Placeholder: would fetch from GitHub Gist
                // For now, just use localStorage cache
            },

            pushSharedTasks: async () => {
                // Placeholder: would push to GitHub Gist
            },

            pushPersonalTasks: async () => {
                // Placeholder: would push to GitHub Gist
            }
        };

        // ============================================================================
        // EVENT LISTENERS
        // ============================================================================
        document.getElementById('search-input').addEventListener('input', (e) => {
            state.searchQuery = e.target.value;
            render.all();
        });

        document.getElementById('sync-btn').addEventListener('click', () => {
            sync.perform();
        });

        // New category modal
        const modal = document.getElementById('new-cat-modal');
        const newCatNameInput = document.getElementById('new-cat-name');
        const newCatColorInput = document.getElementById('new-cat-color');

        document.getElementById('save-cat-btn').addEventListener('click', () => {
            const name = newCatNameInput.value.trim();
            const color = newCatColorInput.value;

            if (name) {
                categories.add(name, color);
                modal.classList.remove('active');
                newCatNameInput.value = '';
                newCatColorInput.value = '#50c878';
            }
        });

        document.getElementById('cancel-cat-btn').addEventListener('click', () => {
            modal.classList.remove('active');
            newCatNameInput.value = '';
            newCatColorInput.value = '#50c878';
        });

        newCatNameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('save-cat-btn').click();
            }
        });

        // ============================================================================
        // INIT
        // ============================================================================
        // SEED DATA — pre-loaded tasks (only seeds if localStorage is empty)
        const SEED_TASKS = [
            {id:1,category:'admin',text:'Read AZCK_AI_Security_Risk_Assessment.pdf',priority:'high',timeEst:'60',dueDate:'2026-04-07',notes:'Full security review of what Claude has access to.',status:'open',markedToday:false,assignedTo:'',activityLog:[],createdAt:'2026-04-05T00:00:00Z',completedAt:null},
            {id:2,category:'admin',text:'Move sensitive folders off shared Drive (Receipts, UPS Payment, Student Intake, DO NOT BOOK)',priority:'high',timeEst:'30',dueDate:'2026-04-09',notes:'',status:'open',markedToday:false,assignedTo:'',activityLog:[],createdAt:'2026-04-05T00:00:00Z',completedAt:null},
            {id:3,category:'admin',text:'Uninstall Productivity plugin',priority:'low',timeEst:'15',dueDate:null,notes:'',status:'open',markedToday:false,assignedTo:'',activityLog:[],createdAt:'2026-04-05T00:00:00Z',completedAt:null},
            {id:4,category:'grants',text:'Contact SR&ED consultant — ask accountant for referral',priority:'high',timeEst:'15',dueDate:'2026-04-07',notes:'New pre-approval process starts Apr 1 2026.',status:'open',markedToday:false,assignedTo:'',activityLog:[],createdAt:'2026-04-05T00:00:00Z',completedAt:null},
            {id:5,category:'grants',text:'Gather all QuadFang R&D receipts & invoices',priority:'high',timeEst:'60',dueDate:'2026-04-08',notes:'Terra Machine invoices, materials, 3D printing, Fusion 360 time.',status:'open',markedToday:false,assignedTo:'',activityLog:[],createdAt:'2026-04-05T00:00:00Z',completedAt:null},
            {id:6,category:'grants',text:'Fill in QuadFang_SRED_Activity_Log.xlsx',priority:'high',timeEst:'30',dueDate:'2026-04-08',notes:'On Desktop.',status:'open',markedToday:false,assignedTo:'',activityLog:[],createdAt:'2026-04-05T00:00:00Z',completedAt:null},
            {id:7,category:'grants',text:'Book meeting with SR&ED consultant',priority:'high',timeEst:'15',dueDate:'2026-04-09',notes:'Also mention AB Innovation Employment Grant (20% extra on same tax return). SR&ED limit doubled to $6M.',status:'open',markedToday:false,assignedTo:'',activityLog:[],createdAt:'2026-04-05T00:00:00Z',completedAt:null},
            {id:8,category:'grants',text:'AB Innovation Employment Grant — tell consultant',priority:'med',timeEst:'15',dueDate:'2026-04-09',notes:'Stacks with SR&ED.',status:'open',markedToday:false,assignedTo:'',activityLog:[],createdAt:'2026-04-05T00:00:00Z',completedAt:null},
            {id:9,category:'grants',text:'Contact NRC IRAP — call 1-877-994-4727',priority:'high',timeEst:'30',dueDate:'2026-04-14',notes:'Week 2.',status:'open',markedToday:false,assignedTo:'',activityLog:[],createdAt:'2026-04-05T00:00:00Z',completedAt:null},
            {id:10,category:'grants',text:'Email Alberta Innovates (Micro-Voucher + Voucher)',priority:'med',timeEst:'30',dueDate:'2026-04-14',notes:'Week 2.',status:'open',markedToday:false,assignedTo:'',activityLog:[],createdAt:'2026-04-05T00:00:00Z',completedAt:null},
            {id:11,category:'grants',text:'Community Futures GP, GPRIN, County of GP — quick wins batch',priority:'med',timeEst:'60',dueDate:'2026-04-14',notes:'Week 2.',status:'open',markedToday:false,assignedTo:'',activityLog:[],createdAt:'2026-04-05T00:00:00Z',completedAt:null},
            {id:12,category:'grants',text:'AWE BRIDGE + Loan — email info@awebusiness.com',priority:'med',timeEst:'30',dueDate:'2026-04-21',notes:'Week 3.',status:'open',markedToday:false,assignedTo:'',activityLog:[],createdAt:'2026-04-05T00:00:00Z',completedAt:null},
            {id:13,category:'grants',text:'WES Loan Fund + WES Grant — research',priority:'med',timeEst:'30',dueDate:'2026-04-21',notes:'Week 3.',status:'open',markedToday:false,assignedTo:'',activityLog:[],createdAt:'2026-04-05T00:00:00Z',completedAt:null},
            {id:14,category:'grants',text:'CDAP — check eligibility at canada.ca/cdap',priority:'med',timeEst:'15',dueDate:'2026-04-28',notes:'Week 4.',status:'open',markedToday:false,assignedTo:'',activityLog:[],createdAt:'2026-04-05T00:00:00Z',completedAt:null},
            {id:15,category:'grants',text:'AMPG — confirm 5+ FTE requirement',priority:'med',timeEst:'15',dueDate:'2026-04-28',notes:'Week 4.',status:'open',markedToday:false,assignedTo:'',activityLog:[],createdAt:'2026-04-05T00:00:00Z',completedAt:null},
            {id:16,category:'grants',text:'Futurpreneur — confirm age eligibility',priority:'med',timeEst:'15',dueDate:'2026-04-28',notes:'Week 4.',status:'open',markedToday:false,assignedTo:'',activityLog:[],createdAt:'2026-04-05T00:00:00Z',completedAt:null},
            {id:17,category:'grants',text:'CanExport SMEs — deadline May 29, 2026',priority:'low',timeEst:'60',dueDate:'2026-05-29',notes:'',status:'open',markedToday:false,assignedTo:'',activityLog:[],createdAt:'2026-04-05T00:00:00Z',completedAt:null},
        ];

        document.addEventListener('DOMContentLoaded', () => {
            storage.load();
            // Seed tasks if localStorage was empty
            if (state.tasks.length === 0) {
                state.tasks = SEED_TASKS;
                storage.save();
            }
            render.all();
        });
    </script>
